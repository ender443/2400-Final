name: 'Terraformer'
description: 'Executes terraform plan and apply steps'
author: 'ender443@'
inputs:
  ARM_CLIENT_ID:
    description: 'The Azure Client ID'
    required: true
  ARM_CLIENT_SECRET:
    description: 'The Azure Client secret'
    required: true
  ARM_SUBSCRIPTION_ID:
    description: 'The Azure sub'
    required: true
  ARM_TENANT_ID:
    description: 'The Azure tenant'
    required: true
  STATE_KEY:
    description: 'the unique key for state lookup'
    required: true
  TF_STAGE:
    description: 'The tf deployment stage'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'